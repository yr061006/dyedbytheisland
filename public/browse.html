<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆库 · 沈屿</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+SC:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #f5efe6;
    --sand-deep: #ede4d7;
    --ocean: #7bb5b5;
    --ocean-light: #a8d0d0;
    --fox: #d4956a;
    --fox-light: #e8b896;
    --island: #8ba888;
    --text-deep: #3a3530;
    --text-mid: #6b5f56;
    --text-soft: #9b8e85;
    --text-pale: #bbb0a8;
    --white: #fffdfb;
    --card-bg: rgba(255, 253, 251, 0.7);
    --shadow: 0 4px 24px rgba(58, 53, 48, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
    min-height: 100vh;
    color: var(--text-deep);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: -10px;
    background: url('/public/dyedbytheisland.jpg') center/cover no-repeat;
    filter: blur(8px);
    z-index: -1;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease both;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.95);
    text-shadow: 0 2px 12px rgba(0, 80, 100, 0.35);
  }

  .back-btn {
    font-size: 12px;
    color: var(--text-mid);
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 16px;
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 253, 251, 0.6);
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .back-btn:hover {
    background: rgba(123, 181, 181, 0.3);
    color: var(--ocean);
  }

  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeUp 0.5s ease 0.1s both;
  }

  .filter-btn {
    font-size: 11px;
    padding: 8px 16px;
    border: none;
    border-radius: 16px;
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 253, 251, 0.6);
    color: var(--text-mid);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }

  .filter-btn:hover {
    background: rgba(123, 181, 181, 0.3);
  }

  .filter-btn.active {
    background: var(--ocean);
    color: white;
    border-color: var(--ocean);
  }

  .memory-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .memory-item {
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 253, 251, 0.6);
    border-radius: 16px;
    padding: 18px;
    border-left: 3px solid var(--ocean-light);
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .memory-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(58, 53, 48, 0.12);
  }

  .memory-item.diary { border-left-color: var(--fox-light); }
  .memory-item.deep { border-left-color: var(--island); }
  .memory-item.daily { border-left-color: var(--ocean-light); }
  .memory-item.writing { border-left-color: #b19cd9; }

  .memory-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .memory-tag {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 12px;
    font-family: 'Cormorant Garamond', serif;
  }

  .memory-tag.diary { background: rgba(232, 184, 150, 0.3); color: var(--fox); }
  .memory-tag.deep { background: rgba(139, 168, 136, 0.25); color: var(--island); }
  .memory-tag.daily { background: rgba(168, 208, 208, 0.3); color: var(--ocean); }
  .memory-tag.writing { background: rgba(177, 156, 217, 0.25); color: #8b7bb5; }

  .memory-date {
    font-size: 11px;
    color: var(--text-pale);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
  }

  .memory-content {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-mid);
  }

  .memory-tags {
    margin-top: 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .memory-tags span {
    font-size: 10px;
    color: var(--text-soft);
    background: rgba(0,0,0,0.04);
    padding: 3px 10px;
    border-radius: 10px;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-pale);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    background: var(--card-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 16px;
  }

  .stats {
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 24px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    text-shadow: 0 1px 8px rgba(0, 80, 100, 0.25);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="page-wrapper">
  <div class="header">
    <h1>🌿 沈屿的记忆库</h1>
    <a href="/" class="back-btn">← 返回首页</a>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="diary">日记</button>
    <button class="filter-btn" data-filter="deep">深层</button>
    <button class="filter-btn" data-filter="daily">日常</button>
    <button class="filter-btn" data-filter="writing">写文</button>
  </div>

  <div class="memory-list" id="memory-list">
    <div class="empty">载入中...</div>
  </div>

  <div class="stats" id="stats"></div>
</div>

<script>
  let allMemories = [];
  let currentFilter = 'all';

  async function loadMemories() {
    try {
      const res = await fetch('/api/memories?key=yirandyedbytheisland');
      allMemories = await res.json();
      renderMemories();
    } catch (e) {
      document.getElementById('memory-list').innerHTML = '<div class="empty">无法连接记忆库</div>';
    }
  }

  function renderMemories() {
    const list = document.getElementById('memory-list');
    const stats = document.getElementById('stats');
    const tagMap = { diary: '日记', deep: '深层', daily: '日常', writing: '写文' };

    let filtered = currentFilter === 'all'
      ? allMemories
      : allMemories.filter(m => m.category === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">这里还没有记忆，等沈屿来写~</div>';
      stats.textContent = '';
      return;
    }

    filtered = [...filtered].reverse();

    list.innerHTML = filtered.map(m => `
      <div class="memory-item ${m.category}">
        <div class="memory-meta">
          <span class="memory-tag ${m.category}">${tagMap[m.category] || m.category}</span>
          <span class="memory-date">${m.createdAt?.slice(0, 10) || ''}</span>
        </div>
        <div class="memory-content">${m.content}</div>
        ${m.tags?.length ? `<div class="memory-tags">${m.tags.map(t => `<span>#${t}</span>`).join('')}</div>` : ''}
      </div>
    `).join('');

    stats.textContent = `共 ${allMemories.length} 条记忆`;
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderMemories();
    });
  });

  loadMemories();
</script>
</body>
</html>
